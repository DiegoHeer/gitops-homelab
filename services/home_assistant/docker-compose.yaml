services:
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:2026.4.4
    restart: unless-stopped
    volumes:
      - /home/diego/services_data/home_assistant/homeassistant/config:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
      - /dev:/dev
    privileged: true
    network_mode: host
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  mosquitto:
    container_name: mosquitto
    image: eclipse-mosquitto:2.1.2-alpine
    restart: unless-stopped
    volumes:
      - /home/diego/services_data/home_assistant/mosquitto/log:/mosquitto/log
      - /home/diego/services_data/home_assistant/mosquitto/data:/mosquitto/data
      - /home/diego/services_data/home_assistant/mosquitto/config:/mosquitto/config
    ports:
      - 1883:1883
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-u", "healthcheck_user", "-P", "healthcheck_password", "-h", "localhost", "-t", "$$SYS/broker/uptime", "-C", "1", "-i", "healthcheck", "-W", "3"]  # yamllint disable-line rule:line-length
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  openthread_border_router:
    container_name: openthread_border_router
    image: ghcr.io/ownbee/hass-otbr-docker:v0.3.0
    restart: unless-stopped
    privileged: true
    network_mode: host
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN
    environment:
      DEVICE: "/dev/ttyUSB1"
      BACKBONE_IF: wlp1s0
      FLOW_CONTROL: 0
      FIREWALL: 1
      NAT64: 1
      BAUDRATE: 460800
      OTBR_REST_PORT: 8081
      OTBR_WEB_PORT: 7586
      AUTOFLASH_FIRMWARE: 0
      OTBR_LOG_LEVEL: info
    devices:
      - /dev/ttyUSB1:/dev/ttyUSB1
      - /dev/net/tun:/dev/net/tun
    volumes:
      - /home/diego/services_data/home_assistant/otbr/otbr_data:/data/thread
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD-SHELL", "test -S /run/openthread-wpan0.sock && nc -z localhost 8081"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  matter_server:
    image: ghcr.io/home-assistant-libs/python-matter-server:8.1.0
    container_name: matter_server
    restart: unless-stopped
    network_mode: host
    volumes:
      - /home/diego/services_data/home_assistant/matter:/data/
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c ':> /dev/tcp/127.0.0.1/5580' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # TODO: check if this properly works
  doorbell_samba:
    image: ghcr.io/servercontainers/samba:a3.22.1-s4.21.4-r4
    container_name: doorbell_samba
    network_mode: host
    restart: unless-stopped
    env_file: secrets.enc.env
    cap_add:
      - CAP_NET_ADMIN
    environment:
      UID_diego: 1000
      SAMBA_VOLUME_CONFIG_doorbell: "[doorbell]; path=/doorbell; available = yes; browsable = yes; writable = yes; read only = no; force user = diego; public = yes; guest ok = yes"  # yamllint disable-line rule:line-length
    volumes:
      - /media/hd1/recordings/doorbell:/doorbell
    healthcheck:
      test: ["CMD", "/container/scripts/docker-healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s


networks:
  default:
    external: true
    name: home_server_network
