services:
  frigate:
    container_name: frigate
    image: ghcr.io/blakeblackshear/frigate:0.17.1
    restart: unless-stopped
    privileged: true
    shm_size: 512mb
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /home/diego/services_data/security/frigate/config:/config
      - /media/hd3/frigate:/media/frigate
      - type: tmpfs
        target: /tmp/cache
        tmpfs:
          size: 500000000
    ports:
      - 8554:8554
      - 8555:8555/tcp
      - 8555:8555/udp
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frigate.rule=Host(`frigate.local.dynabase.nl`)"
      - "traefik.http.routers.frigate.entrypoints=https"
      - "traefik.http.routers.frigate.tls=true"
      - "traefik.http.services.frigate.loadbalancer.server.port=5000"

  authelia:
    container_name: authelia
    image: authelia/authelia:4.39.20
    restart: unless-stopped
    user: "1000:1000"
    command:
      - "--config"
      - "/config/configuration.yml"
      - "--config"
      - "/config/oidc-jwks.yml"
    env_file: secrets.enc.env
    volumes:
      - ./authelia/configuration.yml:/config/configuration.yml:ro
      - ./authelia/users_database.yml:/config/users_database.yml:ro
      - /home/diego/services_data/security/authelia/secrets/oidc-jwks.yml:/config/oidc-jwks.yml:ro
      - /home/diego/services_data/security/authelia/data:/data
    # No Traefik labels: Authelia is reached only via the Cloudflare Tunnel at
    # auth.dynabase.nl. A LAN route (auth.local.dynabase.nl) would break login —
    # the session cookie is scoped to dynabase.nl and the WebAuthn RP is
    # auth.dynabase.nl. cloudflared reaches this container as http://authelia:9091.
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9091/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  default:
    external: true
    name: home_server_network
