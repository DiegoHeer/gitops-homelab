services:
  frigate:
    container_name: frigate
    image: ghcr.io/blakeblackshear/frigate:0.17.1
    restart: unless-stopped
    privileged: true
    shm_size: 512mb
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /home/diego/services_data/security/frigate/config:/config
      - /media/hd3/frigate:/media/frigate
      - type: tmpfs
        target: /tmp/cache
        tmpfs:
          size: 500000000
    ports:
      - 8554:8554
      - 8555:8555/tcp
      - 8555:8555/udp
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frigate.rule=Host(`frigate.local.dynabase.nl`)"
      - "traefik.http.routers.frigate.entrypoints=https"
      - "traefik.http.routers.frigate.tls=true"
      - "traefik.http.services.frigate.loadbalancer.server.port=5000"


networks:
  default:
    external: true
    name: home_server_network
