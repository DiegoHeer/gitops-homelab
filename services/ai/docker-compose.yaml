services:

  n8n:
    container_name: n8n
    image: docker.n8n.io/n8nio/n8n:2.22.2
    restart: unless-stopped
    env_file: n8n.enc.env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n-local.rule=Host(`n8n.local.dynabase.nl`)"
      - "traefik.http.routers.n8n-local.entrypoints=https"
      - "traefik.http.routers.n8n-local.tls=true"
      - "traefik.http.routers.n8n-external.rule=Host(`n8n.dynabase.nl`)"
      - "traefik.http.routers.n8n-external.entrypoints=https"
      - "traefik.http.routers.n8n-external.tls=true"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"
    environment:
      - N8N_RUNNERS_ENABLED=true
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - TZ=Europe/Amsterdam
      - GENERIC_TIMEZONE=Europe/Amsterdam
      - N8N_HOST=n8n.dynabase.nl
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.dynabase.nl/
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=n8n_postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_SCHEMA=public
    volumes:
      - /home/diego/services_data/ai/n8n/data:/home/node/.n8n
    depends_on:
      n8n_postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: wget --spider http://localhost:5678/healthz > /dev/null 2>&1 || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  n8n_postgres:
    container_name: n8n_postgres
    restart: unless-stopped
    image: postgres:18.4-alpine
    env_file: n8n.enc.env
    volumes:
      - /home/diego/services_data/ai/n8n/postgresql:/var/lib/postgresql
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_DB=n8n
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Prerequisite: run the interactive setup wizard once on the server before first deploy:
  #   docker run -it --rm -v /home/diego/services_data/ai/hermes:/opt/data nousresearch/hermes-agent setup
  hermes_agent:
    container_name: hermes_agent
    image: nousresearch/hermes-agent:v2026.5.16
    restart: unless-stopped
    command: gateway run
    env_file: hermes.enc.env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hermes-agent.rule=Host(`hermes.local.dynabase.nl`)"
      - "traefik.http.routers.hermes-agent.entrypoints=https"
      - "traefik.http.routers.hermes-agent.tls=true"
      - "traefik.http.services.hermes-agent.loadbalancer.server.port=8642"
    environment:
      - HERMES_DASHBOARD=1
      - HERMES_UID=1000
      - HERMES_GID=1000
      - API_SERVER_ENABLED=true
      - API_SERVER_HOST=0.0.0.0
    volumes:
      - /home/diego/services_data/ai/hermes:/opt/data
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: curl -sf http://localhost:9119/ > /dev/null || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Prerequisite: after first deploy, generate the OAuth token:
  #   docker exec -it claudebox claudebox setup-token
  # Then update claudebox.enc.env with the token, re-encrypt, commit, and push.
  claudebox:
    container_name: claudebox
    image: psyb0t/claudebox:v1.14.0-minimal
    restart: unless-stopped
    env_file: claudebox.enc.env
    environment:
      - CLAUDEBOX_MODE_API=1
      - CLAUDEBOX_MODE_API_PORT=8080
    volumes:
      - /home/diego/projects:/workspaces:rw
      - /home/diego/services_data/ai/claudebox:/home/claude/.claude
    deploy:
      resources:
        limits:
          memory: 1024M
    healthcheck:
      test: curl -sf http://localhost:8080/health > /dev/null || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  default:
    external: true
    name: home_server_network
