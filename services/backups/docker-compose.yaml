services:
  zerobyte:
    container_name: zerobyte
    image: ghcr.io/nicotsx/zerobyte:v0.40.0
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse:/dev/fuse
    env_file: secrets.enc.env
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/lib/zerobyte:/var/lib/zerobyte
      - /home/diego/.config/rclone:/root/.config/rclone
      - /media/hd1/nextcloud/diego/files:/nextcloud
      - /home/diego/services_data:/services_data:ro
      - /media/hd1/photo_library:/photo_library
      - /media/hd3:/hd3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.zerobyte.rule=Host(`zerobyte.local.dynabase.nl`)"
      - "traefik.http.routers.zerobyte.entrypoints=https"
      - "traefik.http.routers.zerobyte.tls=true"
      - "traefik.http.services.zerobyte.loadbalancer.server.port=4096"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4096"]
      interval: 10s
      timeout: 5s
      retries: 5

  databasus:
    container_name: databasus
    image: databasus/databasus:v3.47.1
    restart: unless-stopped
    volumes:
      - /home/diego/services_data/backups/databasus:/databasus-data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.databasus.rule=Host(`databasus.local.dynabase.nl`)"
      - "traefik.http.routers.databasus.entrypoints=https"
      - "traefik.http.routers.databasus.tls=true"
      - "traefik.http.services.databasus.loadbalancer.server.port=4005"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4005"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  default:
    external: true
    name: home_server_network
