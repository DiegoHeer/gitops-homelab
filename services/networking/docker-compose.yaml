services:
  traefik:
    container_name: traefik
    image: traefik:v3.7.1
    restart: unless-stopped
    env_file: secrets.enc.env
    ports:
      - 80:80
      - 8080:8080
      - 443:443
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./traefik/traefik.yml:/traefik.yml:ro
      - /home/diego/services_data/networking/traefik/acme.json:/acme.json
      - ./traefik/config.yml:/config.yml:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.entrypoints=http"
      - "traefik.http.routers.traefik.rule=Host(`traefik.local.dynabase.nl`)"
      - "traefik.http.middlewares.traefik-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.sslheader.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.traefik.middlewares=traefik-https-redirect"
      - "traefik.http.routers.traefik-secure.entrypoints=https"
      - "traefik.http.routers.traefik-secure.rule=Host(`traefik.local.dynabase.nl`)"
      - "traefik.http.routers.traefik-secure.tls=true"
      - "traefik.http.routers.traefik-secure.tls.certresolver=cloudflare"
      - "traefik.http.routers.traefik-secure.tls.domains[0].main=local.dynabase.nl"
      - "traefik.http.routers.traefik-secure.tls.domains[0].sans=*.local.dynabase.nl"
      - "traefik.http.routers.traefik-secure.service=api@internal"
      # Traefik auto-reloads traefik.yml/config.yml via its file provider — don't
      # recreate the container on edits to those static config files in the repo.
      - "cd.doco.deployment.recreate.ignore={bindMounts: [/traefik.yml, /config.yml]}"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  traefik-pihole-dns-sync:
    image: ghcr.io/rpressiani/traefik-pihole-dns-sync:v0.1.0
    container_name: traefik-pihole-dns-sync
    restart: unless-stopped
    env_file: secrets.enc.env
    environment:
      - TRAEFIK_API_URL=http://traefik:8080/api/http/routers
      - SYNC_INTERVAL=@every 1m

  cloudflare_tunnel:
    container_name: cloudflare_tunnel
    image: cloudflare/cloudflared:2026.5.2
    restart: unless-stopped
    env_file: secrets.enc.env
    # cloudflared's TUNNEL_TOKEN env var is silently rejected by v2026.3.0;
    # pass the token explicitly on the command line instead.
    command: ["tunnel", "--no-autoupdate", "run", "--token-file", "/run/secrets/tunnel_token"]
    environment:
      TUNNEL_METRICS: "0.0.0.0:60123"
    secrets:
      - tunnel_token
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

secrets:
  tunnel_token:
    file: /home/diego/.config/cloudflared/tunnel_token

networks:
  default:
    external: true
    name: home_server_network
