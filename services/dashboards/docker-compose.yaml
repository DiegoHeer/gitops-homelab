services:
  homarr:
    container_name: homarr
    restart: unless-stopped
    image: ghcr.io/homarr-labs/homarr:v1.65.0
    env_file: secrets.enc.env
    volumes:
      - /home/diego/services_data/dashboards/homarr/appdata:/appdata
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "homarr --version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homarr.rule=Host(`homarr.local.dynabase.nl`)"
      - "traefik.http.routers.homarr.entrypoints=https"
      - "traefik.http.routers.homarr.tls=true"
      - "traefik.http.services.homarr.loadbalancer.server.port=7575"

  glance:
    container_name: glance
    image: glanceapp/glance:v0.8.5
    restart: unless-stopped
    volumes:
      - /home/diego/services_data/dashboards/glance/config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8080/api/healthz || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.glance.rule=Host(`glance.local.dynabase.nl`)"
      - "traefik.http.routers.glance.entrypoints=https"
      - "traefik.http.routers.glance.tls=true"
      - "traefik.http.services.glance.loadbalancer.server.port=8080"

  dash:
    container_name: dash
    image: mauricenino/dashdot:6.3.4
    restart: unless-stopped
    privileged: true
    environment:
      DASHDOT_ENABLE_CPU_TEMPS: 'true'
    volumes:
      - /:/mnt/host:ro
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:3001 || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dash.rule=Host(`dash.local.dynabase.nl`)"
      - "traefik.http.routers.dash.entrypoints=https"
      - "traefik.http.routers.dash.tls=true"
      - "traefik.http.services.dash.loadbalancer.server.port=3001"

  homepage:
    container_name: homepage
    image: ghcr.io/gethomepage/homepage:v1.13.2
    restart: unless-stopped
    ports:
      - 3000:3000
    env_file: secrets.enc.env
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - /home/diego/services_data/dashboards/homepage/config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homepage.rule=Host(`homepage.local.dynabase.nl`)"
      - "traefik.http.routers.homepage.entrypoints=https"
      - "traefik.http.routers.homepage.tls=true"
      - "traefik.http.services.homepage.loadbalancer.server.port=3000"

networks:
  default:
    name: home_server_network
    driver: bridge
    external: true
