services:
  doco-cd:
    container_name: doco-cd
    image: ghcr.io/kimdre/doco-cd:0.88.0
    restart: unless-stopped
    cap_drop:
      - ALL
    environment:
      TZ: Europe/Amsterdam
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      # DocoCD's SOPS_AGE_KEY_FILE variant does not load the key (v0.80.1 as of 2026-04);
      # pass the secret key content directly via SOPS_AGE_KEY, sourced from the Ansible-
      # templated .env file.
      SOPS_AGE_KEY: ${SOPS_AGE_KEY}
      # DocoCD posts notifications to the sidecar Apprise API; without APPRISE_API_URL
      # the Send() path silently no-ops (internal/notification/notification.go).
      APPRISE_API_URL: http://apprise:8000/notify
      APPRISE_NOTIFY_URLS: ${APPRISE_NOTIFY_URLS}
      APPRISE_NOTIFY_LEVEL: ${APPRISE_NOTIFY_LEVEL}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - doco-cd-data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.doco-cd.rule=Host(`doco-cd.dynabase.nl`)"
      - "traefik.http.routers.doco-cd.entrypoints=https"
      - "traefik.http.routers.doco-cd.tls=true"
      - "traefik.http.services.doco-cd.loadbalancer.server.port=80"
    # start-order only (not service_healthy): if apprise is unreachable,
    # DocoCD's Send() just returns an error per deploy - preferable to
    # blocking the webhook listener on a notification sidecar.
    depends_on:
      - apprise

  apprise:
    container_name: apprise
    image: caronc/apprise:v1.4.1
    restart: unless-stopped
    environment:
      TZ: Europe/Amsterdam
      APPRISE_WORKER_COUNT: 1
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  doco-cd-data:

networks:
  default:
    external: true
    name: home_server_network
