# DocoCD stack registry. One YAML document per managed stack.
# Append a `---` block per category as it migrates from Ansible to DocoCD.
# Auto-discovery stays off; each managed stack is listed explicitly.
#
# Every stack pins `webhook_filter` to `^refs/heads/main$` so only pushes to
# main trigger a reconcile. Without this, pushes to feature/Renovate branches
# would deploy their content to the live stack.
#
# NOT listed here on purpose:
# - gitops/: DocoCD cannot manage its own container (self-deploy recursion).
name: monitoring
working_dir: services/monitoring
webhook_filter: "^refs/heads/main$"
